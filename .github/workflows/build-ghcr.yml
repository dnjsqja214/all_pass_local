name: Build and Push Frontend Image to GHCR

on:
  push:
    branches:
      - main
    # 매니페스트·문서만 바뀐 push는 재빌드 건너뜀.
    # (아래 태그 갱신 커밋이 k8s/ 를 건드리므로 무한루프 방지에도 필요)
    paths-ignore:
      - 'k8s/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write # 매니페스트 태그 갱신 커밋을 push 하려면 write 필요
  packages: write # GHCR push

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/allpass-front:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/allpass-front:latest \
            -f Dockerfile \
            .

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/allpass-front:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/allpass-front:latest

      # 빌드한 이미지의 SHA 태그를 매니페스트에 써넣고 커밋·push
      # → ArgoCD가 매니페스트 변경을 감지해 자동 배포
      # [skip ci] + paths-ignore(k8s/**) 로 이 커밋이 워크플로를 재트리거하지 않게 함
      - name: Update manifest image tag
        run: |
          sed -i -E "s|(image: ghcr\.io/[^:]+/allpass-front):.*|\1:${{ github.sha }}|" k8s/allpass-front.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/allpass-front.yaml
          git commit -m "chore: bump image tag to ${{ github.sha }} [skip ci]" || echo "no changes to commit"
          git push origin HEAD:main
